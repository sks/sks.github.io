theme: minima
title: "Production Notes"
description: "Production engineering notes on enterprise AI agents, workflows, and SRE — by Sabith K S, Staff Engineer at StackGen."
url: "https://productionnotes.dev"
baseurl: ""

author:
  name: Sabith K S
  title: Staff Engineer
  company: StackGen
  github: "https://github.com/sks"
  linkedin: "https://linkedin.com/in/sabithks"

newsletter_url: ""

minima:
  social_links:
    - { platform: github, user_url: "https://github.com/sks" }
    - { platform: linkedin, user_url: "https://linkedin.com/in/sabithks" }

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

feed:
  posts_limit: 20
  excerpt_only: true

defaults:
  - scope:
      path: ""
    values:
      image: /assets/images/og-default.png
  - scope:
      path: "_posts"
      type: "posts"
    values:
      layout: "post"
      author: "Sabith K S"

header_pages:
  - about.md
  - series/enterprise-ai-agents-go.md

markdown: kramdown
highlighter: rouge
permalink: /blog/:title/
