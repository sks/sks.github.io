# Sample workflow for building and deploying a Jekyll site to GitHub Pages
name: Deploy Jekyll site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Pages
        uses: actions/configure-pages@v6
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  notify-indexnow:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Ping IndexNow (Bing, Yandex, and partners)
        env:
          INDEXNOW_KEY: a9faf91a081fa0b3582b992495fc78fa
          SITE_URL: https://productionnotes.dev
        run: |
          set -euo pipefail
          curl -sS -G "https://www.bing.com/indexnow" \
            --data-urlencode "url=${SITE_URL}/" \
            --data-urlencode "key=${INDEXNOW_KEY}"
          curl -sS -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "{\"host\":\"productionnotes.dev\",\"key\":\"${INDEXNOW_KEY}\",\"keyLocation\":\"${SITE_URL}/${INDEXNOW_KEY}.txt\",\"urlList\":[\"${SITE_URL}/\",\"${SITE_URL}/series/enterprise-ai-agents-go/\"]}"
