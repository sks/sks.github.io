# Sample workflow for building and deploying a Jekyll site to GitHub Pages
name: Deploy Jekyll site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Pages
        uses: actions/configure-pages@v6
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  notify-indexnow:
    runs-on: ubuntu-latest
    needs: [build, deploy]
    steps:
      - name: Download site artifact
        uses: actions/download-artifact@v4
        with:
          name: github-pages
          path: _site

      - name: Submit sitemap URLs to IndexNow
        env:
          INDEXNOW_KEY: a9faf91a081fa0b3582b992495fc78fa
          SITE_HOST: productionnotes.dev
          SITE_URL: https://productionnotes.dev
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          import re
          import sys
          import urllib.error
          import urllib.request
          from pathlib import Path

          sitemap_path = Path("_site/sitemap.xml")
          if not sitemap_path.is_file():
              print(f"missing {sitemap_path}", file=sys.stderr)
              sys.exit(1)

          urls = re.findall(r"<loc>([^<]+)</loc>", sitemap_path.read_text(encoding="utf-8"))
          urls = sorted({url.strip() for url in urls if url.strip()})
          if not urls:
              print("no URLs found in sitemap.xml", file=sys.stderr)
              sys.exit(1)

          key = os.environ["INDEXNOW_KEY"]
          payload = {
              "host": os.environ["SITE_HOST"],
              "key": key,
              "keyLocation": f"{os.environ['SITE_URL']}/{key}.txt",
              "urlList": urls,
          }

          req = urllib.request.Request(
              "https://api.indexnow.org/indexnow",
              data=json.dumps(payload).encode("utf-8"),
              headers={"Content-Type": "application/json; charset=utf-8"},
              method="POST",
          )

          try:
              with urllib.request.urlopen(req) as resp:
                  print(f"IndexNow accepted {len(urls)} URL(s) (HTTP {resp.status})")
          except urllib.error.HTTPError as err:
              print(f"IndexNow HTTP {err.code}: {err.read().decode()}", file=sys.stderr)
              sys.exit(1)
          PY
